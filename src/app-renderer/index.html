<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orbit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="titlebar">
        <nav class="menu" aria-label="Application menu">
          <span class="brand">Orbit</span>
          <button type="button">File</button>
          <button type="button">View</button>
          <button type="button">Window</button>
          <button id="viewModeButton" class="view-mode-button" type="button">Overlay</button>
        </nav>
        <div class="window-controls" aria-label="Window controls">
          <button id="minimizeWindow" type="button" aria-label="Minimize">-</button>
          <button id="maximizeWindow" type="button" aria-label="Maximize">□</button>
          <button id="closeWindow" type="button" aria-label="Close">×</button>
        </div>
      </header>

      <aside class="sidebar" aria-label="Orbit navigation">
        <div class="sidebar-top-actions">
          <button id="newChatButton" class="primary-nav-button" type="button">
            <span class="plus">+</span>
            <span>New Conversation</span>
          </button>
          <button id="historyButton" class="nav-button" type="button">
            <span class="nav-icon">○</span>
            <span>Conversation History</span>
          </button>
          <button id="tasksButton" class="nav-button" type="button">
            <span class="nav-icon">◷</span>
            <span>Scheduled Tasks</span>
          </button>
        </div>

        <section class="sidebar-section">
          <div class="section-heading">
            <span>Projects</span>
            <div class="section-actions">
              <button id="sortProjectsButton" type="button" aria-label="Sort projects">≡</button>
              <button id="addProjectButton" type="button" aria-label="Add project">+</button>
            </div>
          </div>
          <div id="projectsList" class="projects-list"></div>
        </section>

        <section class="sidebar-section conversations-section">
          <div class="section-heading">
            <span>Conversations</span>
          </div>
          <div id="conversationsList" class="conversations-list"></div>
        </section>

        <div class="sidebar-footer">
          <button id="settingsButton" class="nav-button" type="button">
            <span class="nav-icon">⚙</span>
            <span>Settings</span>
          </button>
        </div>
      </aside>

      <main class="workspace" aria-label="Conversation workspace">
        <canvas id="solarCanvas" class="solar-canvas" aria-hidden="true"></canvas>
        <div class="solar-vignette" aria-hidden="true"></div>

        <section id="conversationStage" class="conversation-stage">
          <div id="chatHeader" class="chat-header">
            <button id="activeProjectButton" class="project-chip" type="button">
              <span class="folder-mark"></span>
              <span id="activeProjectName">Orbit</span>
              <span class="chevron">⌄</span>
            </button>
          </div>

          <div id="emptyState" class="empty-state">
            <div class="orbit-mark" aria-hidden="true">
              <span></span>
            </div>
            <h1>Where should we point Voyager?</h1>
          </div>

          <div id="messages" class="messages" aria-live="polite"></div>

          <form id="composer" class="composer" autocomplete="off">
            <textarea id="promptInput" rows="2" placeholder="Ask anything, @ to mention, / for actions" aria-label="Message"></textarea>
            <div class="composer-toolbar">
              <div class="composer-left">
                <button id="attachButton" type="button" aria-label="Attach context">+</button>
                <select id="modelSelect" aria-label="AI model">
                  <option>Voyager 1 Flash</option>
                  <option>Voyager 1</option>
                  <option>Voyager 2 Preview</option>
                  <option>Voyager 2 Pro</option>
                  <option>Orchestra 1.1</option>
                </select>
              </div>
              <div class="composer-right">
                <button id="composerModeButton" class="mode-pill view-switch-pill" type="button">Overlay</button>
                <button id="localModeButton" class="mode-pill" type="button">Local</button>
                <button id="micButton" class="round-button" type="button" aria-label="Voice input">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="9" y="3" width="6" height="10" rx="3"></rect>
                    <path d="M5 11a7 7 0 0 0 14 0"></path>
                    <path d="M12 18v3"></path>
                  </svg>
                </button>
                <button id="sendButton" class="send-button" type="submit" aria-label="Send">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M5 12h13"></path>
                    <path d="m13 6 6 6-6 6"></path>
                  </svg>
                </button>
              </div>
            </div>
          </form>
        </section>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
