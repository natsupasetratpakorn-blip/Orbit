<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orbit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css" />
    <!-- Resolve the bare "@huggingface/transformers" specifier used by the
         local Whisper transcription module (shared with the overlay). -->
    <script type="importmap">
      {
        "imports": {
          "@huggingface/transformers": "https://esm.sh/@huggingface/transformers@3.7.5"
        }
      }
    </script>
  </head>
  <body>
    <canvas id="solarCanvas" class="solar-canvas" aria-hidden="true"></canvas>
    <div id="cursorGlow" class="cursor-glow" aria-hidden="true"></div>

    <div class="app-shell">
      <header class="titlebar">
        <nav class="menu" aria-label="Application menu">
          <span class="brand">
            <span class="brand-dot"></span>
            Orbit
          </span>
          <button type="button" class="menu-item" data-menu="file">File</button>
          <button type="button" class="menu-item" data-menu="view">View</button>
          <button type="button" class="menu-item" data-menu="window">Window</button>
          <div id="menuDropdown" class="menu-dropdown" hidden></div>
          <button id="viewModeButton" class="view-mode-button" type="button" title="Switch to floating overlay">↗ Overlay</button>
        </nav>
        <div class="window-controls" aria-label="Window controls">
          <button id="minimizeWindow" type="button" aria-label="Minimize">─</button>
          <button id="maximizeWindow" type="button" aria-label="Maximize">▢</button>
          <button id="closeWindow" type="button" aria-label="Close">×</button>
        </div>
      </header>

      <aside class="sidebar" aria-label="Orbit navigation">
        <div class="sidebar-top-actions">
          <button id="newChatButton" class="primary-nav-button" type="button">
            <span class="plus">+</span>
            <span>New Conversation</span>
          </button>
          <button id="historyButton" class="nav-button" type="button">
            <span class="nav-icon">◷</span>
            <span>History</span>
          </button>
          <button id="tasksButton" class="nav-button" type="button">
            <span class="nav-icon">◧</span>
            <span>Background Agents</span>
          </button>
        </div>

        <section class="sidebar-section">
          <div class="section-heading">
            <span>Projects</span>
            <div class="section-actions">
              <button id="addProjectButton" type="button" aria-label="Add project" title="New project">+</button>
            </div>
          </div>
          <div id="projectsList" class="projects-list"></div>
        </section>

        <section class="sidebar-section">
          <div class="section-heading">
            <span>Project Files</span>
            <div class="section-actions">
              <button id="addFileButton" type="button" aria-label="Attach file to project" title="Attach file">+</button>
            </div>
          </div>
          <div id="filesList" class="files-list"></div>
        </section>

        <section class="sidebar-section conversations-section">
          <div class="section-heading">
            <span>Conversations</span>
          </div>
          <div id="conversationsList" class="conversations-list"></div>
        </section>

        <div class="sidebar-footer">
          <button id="settingsButton" class="nav-button" type="button">
            <span class="nav-icon">⚙</span>
            <span>Settings</span>
          </button>
        </div>
      </aside>

      <main class="workspace" aria-label="Conversation workspace">
        <section id="conversationStage" class="conversation-stage">
          <div id="chatHeader" class="chat-header">
            <button id="activeProjectButton" class="project-chip" type="button">
              <span class="folder-mark"></span>
              <span id="activeProjectName">Orbit</span>
              <span class="chevron">⌄</span>
            </button>
            <div class="chat-header-spacer"></div>
            <div class="chat-header-stats">
              <span id="chatStatTokens" class="stat-pill" title="Approximate token count of this conversation">0 tk</span>
              <span id="chatStatMessages" class="stat-pill" title="Number of messages">0 msg</span>
            </div>
          </div>

          <div id="emptyState" class="empty-state">
            <div class="orbit-mark" aria-hidden="true">
              <span></span>
            </div>
            <h1>Where should we point Voyager?</h1>
            <p class="empty-sub">Ask anything, drop files via <kbd>+</kbd>, or hit <kbd>/</kbd> for commands.</p>
          </div>

          <div id="messages" class="messages" aria-live="polite"></div>

          <form id="composer" class="composer" autocomplete="off">
            <div id="attachedFilesRow" class="attached-files-row" hidden></div>
            <div id="slashMenu" class="slash-menu" hidden></div>

            <textarea id="promptInput" rows="2" placeholder="Ask anything · @ to mention · / for actions" aria-label="Message"></textarea>

            <div class="composer-toolbar">
              <div class="composer-left">
                <button id="attachButton" type="button" class="round-button" aria-label="Attach files" title="Attach file or screenshot">+</button>
                <button id="regionButton" type="button" class="round-button" aria-label="Capture region" title="Capture screen region">▭</button>
                <div class="custom-select-container" id="appModelSelectContainer">
                  <button id="modelSelectBtn" type="button" class="model-pill" aria-label="AI model">
                    <span id="modelSelectLabel">Voyager 1 Flash</span> <span class="chevron-tiny">▾</span>
                  </button>
                  <div id="modelSelectOptions" class="model-options" hidden>
                    <div class="custom-select-option" data-value="Auto">⊛ Auto</div>
                    <div class="custom-select-category" data-category="voyager-1">
                      <div class="custom-select-category-header">
                        <span>✧ Voyager 1</span>
                        <span class="cat-arrow">›</span>
                      </div>
                      <div class="custom-select-submenu">
                        <div class="submenu-inner">
                          <div class="custom-select-option selected" data-value="Voyager 1 Flash">⬦ Voyager 1 Flash</div>
                          <div class="custom-select-option" data-value="Voyager 1">✧ Voyager 1</div>
                        </div>
                      </div>
                    </div>
                    <div class="custom-select-category" data-category="voyager-2">
                      <div class="custom-select-category-header">
                        <span>◈ Voyager 2</span>
                        <span class="cat-arrow">›</span>
                      </div>
                      <div class="custom-select-submenu">
                        <div class="submenu-inner">
                          <div class="custom-select-option" data-value="Voyager 2">✦ Voyager 2</div>
                          <div class="custom-select-option" data-value="Voyager 2 Pro">⬡ Voyager 2 Pro</div>
                          <div class="custom-select-option" data-value="Voyager 2.1 Preview">◈ Voyager 2.1 Preview</div>
                        </div>
                      </div>
                    </div>
                    <div class="custom-select-category" data-category="orchestra">
                      <div class="custom-select-category-header">
                        <span>❖ Orchestra</span>
                        <span class="cat-arrow">›</span>
                      </div>
                      <div class="custom-select-submenu">
                        <div class="submenu-inner">
                          <div class="custom-select-option" data-value="Orchestra 1.1">❖ Orchestra 1.1</div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
                <button id="modeButton" type="button" class="mode-pill" data-mode="ask" title="Switch mode (Ask / Agents / Planning)">❯ Ask</button>
              </div>
              <div class="composer-right">
                <button id="screenshotToggleButton" type="button" class="round-button" aria-label="Toggle screenshot context" title="Auto-attach screenshot">▦</button>
                <canvas id="micVisualizer" class="mic-visualizer" hidden></canvas>
                <button id="micButton" type="button" class="round-button" aria-label="Voice input" title="Voice input">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="9" y="3" width="6" height="10" rx="3"></rect>
                    <path d="M5 11a7 7 0 0 0 14 0"></path>
                    <path d="M12 18v3"></path>
                  </svg>
                </button>
                <button id="sendButton" class="send-button" type="submit" aria-label="Send" title="Send">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M5 12h13"></path>
                    <path d="m13 6 6 6-6 6"></path>
                  </svg>
                </button>
              </div>
            </div>
          </form>
        </section>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
