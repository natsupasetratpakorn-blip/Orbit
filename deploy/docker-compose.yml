# Hosts BOTH the Orbit website and the API on one box, behind automatic HTTPS.
#   website  ->  https://orbit.masher.me/
#   API      ->  https://orbit.masher.me/v1/...
#
# Start everything:   docker compose up -d --build
# See the guide:      ../DEPLOY.md
services:
  gateway:
    build: ../gateway
    restart: unless-stopped
    env_file: ./gateway.env            # you create this (see DEPLOY.md)
    environment:
      USAGE_FILE: /data/usage.json
      # Use the gcloud login you ran on the host (no service-account key needed).
      # We mount the host's gcloud config below and point ADC at the token file.
      GOOGLE_APPLICATION_CREDENTIALS: /gcloud/application_default_credentials.json
    volumes:
      - ./data:/data                   # holds usage counts
      # Your host gcloud login (from `gcloud auth application-default login`).
      # ${HOME}/.config/gcloud is where ADC + the quota project are stored.
      - ${HOME}/.config/gcloud:/gcloud:ro
      # Live-mount the plans/keys file so changing a plan just needs a restart,
      # not a rebuild:  docker compose restart gateway
      - ../gateway/config.js:/app/config.js:ro

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../orbit-website:/srv:ro        # the marketing website (static files)
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - gateway

volumes:
  caddy_data:
  caddy_config:
