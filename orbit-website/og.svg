<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="'Space Grotesk', 'Segoe UI', sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="34%" r="75%">
      <stop offset="0%" stop-color="#16161c"/>
      <stop offset="60%" stop-color="#08080b"/>
      <stop offset="100%" stop-color="#040406"/>
    </radialGradient>
    <radialGradient id="moon" cx="35%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#c9c9cf"/>
      <stop offset="100%" stop-color="#45454c"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="120" cy="90" r="1.6" opacity="0.7"/><circle cx="300" cy="160" r="1.1" opacity="0.5"/>
    <circle cx="520" cy="70" r="1.4" opacity="0.6"/><circle cx="980" cy="120" r="1.8" opacity="0.8"/>
    <circle cx="1080" cy="300" r="1.2" opacity="0.5"/><circle cx="160" cy="430" r="1.5" opacity="0.6"/>
    <circle cx="1040" cy="520" r="1.3" opacity="0.55"/><circle cx="420" cy="540" r="1.1" opacity="0.5"/>
    <circle cx="760" cy="500" r="1.6" opacity="0.7"/><circle cx="880" cy="420" r="1.0" opacity="0.45"/>
  </g>
  <!-- orbit mark -->
  <g transform="translate(600 250)">
    <ellipse rx="150" ry="58" fill="none" stroke="#ffffff" stroke-opacity="0.16" transform="rotate(-18)"/>
    <ellipse rx="185" ry="74" fill="none" stroke="#ffffff" stroke-opacity="0.10" transform="rotate(-18)"/>
    <circle r="34" fill="url(#moon)"/>
    <circle cx="150" cy="-2" r="6" fill="#ffffff" transform="rotate(-18)"/>
  </g>
  <text x="600" y="430" text-anchor="middle" fill="#ffffff" font-size="92" font-weight="700" letter-spacing="14">ORBIT</text>
  <text x="600" y="492" text-anchor="middle" fill="#9a9ea8" font-size="30" font-weight="500">The AI copilot that actually sees your screen.</text>
  <text x="600" y="556" text-anchor="middle" fill="#6a6e78" font-size="22" letter-spacing="3">POWERED BY THE VOYAGER MODEL SERIES</text>
</svg>
